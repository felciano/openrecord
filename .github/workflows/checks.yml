name: CI
on:
  push:
  pull_request:
jobs:
  build:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd web && bun install
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npx eslint .
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - run: cd web && npx eslint .
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      - run: bun run test
      - run: cd web && bun --bun next build
      - run: docker build .
        timeout-minutes: 20

  web-server-smoke:
    name: Web server smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd web && bun install
      - name: Build web app
        run: cd web && bun --bun next build
      - name: Start web server and verify health check
        run: |
          cd web && PORT=3000 bun run start &
          SERVER_PID=$!

          # Wait for server to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start within 30s"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          # Verify health endpoint response
          RESPONSE=$(curl -sf http://localhost:3000/api/health)
          echo "Health check response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'

          # Verify the home page loads (redirects to login when unauthenticated)
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/)
          echo "Home page status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 307 ]; then
            echo "Expected 200 or 307, got $HTTP_CODE"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          # Clean up
          kill $SERVER_PID 2>/dev/null || true
          echo "Web server smoke test passed"

  fake-mychart:
    name: Fake MyChart integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Install fake-mychart deps
        run: cd fake-mychart && bun install
      - name: Build & start fake-mychart server
        run: |
          cd fake-mychart && bun run build && PORT=4000 bun run start &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:4000/ | grep -q '302'; then
              echo "Server ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start within 30s"
              exit 1
            fi
            echo "Waiting for server... ($i)"
            sleep 1
          done
      - name: Run scrapers against fake-mychart
        run: bun run test:fake-mychart
      - name: Install npm-package deps
        run: cd npm-package && bun install
      - name: Build npm-package
        run: cd npm-package && bun run build
      - name: Run npm-package tests against local fake-mychart
        run: cd npm-package && bun run test
        env:
          FAKE_MYCHART_HOST: localhost:4000

  fake-mychart-terms:
    name: Fake MyChart T&C integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Install fake-mychart deps
        run: cd fake-mychart && bun install
      - name: Build & start fake-mychart server with T&C required
        run: |
          cd fake-mychart && bun run build
          FAKE_MYCHART_REQUIRE_TERMS=true PORT=4001 bun run start &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:4001/ | grep -q '302'; then
              echo "Server ready"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 1
          done
      - name: Run T&C integration tests
        run: FAKE_MYCHART_TERMS_HOST=localhost:4001 bun run test:fake-mychart-terms

  integration:
    name: Integration tests (Docker Compose)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd tests/integration/ci && bun install
      - name: Install Playwright browsers
        run: cd tests/integration/ci && bunx playwright install --with-deps chromium
      - name: Start services
        run: docker compose -f docker-compose.ci.yaml up -d --build --wait
        timeout-minutes: 10
      - name: Run integration tests
        run: bun run test:ci-integration
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yaml logs
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yaml down -v
