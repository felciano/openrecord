name: Update PR branches with main
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update open non-draft PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          prs=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --base main \
            --json number,headRefName,isDraft,mergeStateStatus \
            --limit 100)

          echo "$prs" | jq -r '.[] | select(.isDraft | not) | "\(.number)\t\(.headRefName)\t\(.mergeStateStatus)"' | while IFS=$'\t' read -r num branch state; do
            if [ "$state" = "BEHIND" ] || [ "$state" = "BLOCKED" ]; then
              echo "Updating PR #$num ($branch, state=$state)"
              if ! gh api -X PUT "repos/$GITHUB_REPOSITORY/pulls/$num/update-branch" >/dev/null 2>&1; then
                echo "  skipped (likely conflicts or not behind)"
              fi
            else
              echo "Skipping PR #$num ($branch, state=$state)"
            fi
          done
